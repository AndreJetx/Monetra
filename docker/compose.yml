services:
  postgres:
    image: postgres:16-alpine
    container_name: monetra-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: monetra
      POSTGRES_PASSWORD: monetra
      POSTGRES_DB: monetra
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
